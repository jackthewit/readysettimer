<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f17" />
  <meta name="description" content="ReadySetTimer — presentation-scale timer, Pomodoro & stopwatch. Eight languages, keyboard shortcuts, CSV export. Runs in your browser." />
  <meta name="keywords" content="timer, pomodoro, stopwatch, presentation timer, 타이머, 뽀모도로, 스톱워치, プレゼンタイマー, 番茄钟, cronómetro, minuteur" />
  <meta name="author" content="ReadySetTimer" />
  <link rel="canonical" href="https://rstimer.kr/" />
  <title>ReadySetTimer — Presentation Timer, Pomodoro & Stopwatch</title>

  <!-- Open Graph (kakao/facebook/slack preview) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://rstimer.kr/" />
  <meta property="og:title" content="ReadySetTimer" />
  <meta property="og:description" content="프레젠테이션 타이머 · 뽀모도로 · 스톱워치 — 8개 언어 지원, 크롬 최적화" />
  <meta property="og:site_name" content="ReadySetTimer" />
  <meta property="og:locale" content="ko_KR" />
  <meta property="og:locale:alternate" content="en_US" />
  <meta property="og:locale:alternate" content="ja_JP" />
  <meta property="og:locale:alternate" content="zh_CN" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="ReadySetTimer" />
  <meta name="twitter:description" content="Multilingual presentation timer, Pomodoro & stopwatch" />

  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='34' r='24' fill='none' stroke='%2322d3ee' stroke-width='5'/%3E%3Cpath d='M32 20v14l9 5' stroke='%2322d3ee' stroke-width='5' stroke-linecap='round' fill='none'/%3E%3Crect x='26' y='6' width='12' height='6' rx='2' fill='%2322d3ee'/%3E%3C/svg%3E" />

  <!-- Google AdSense — site verification script.
       Ad units (<ins class="adsbygoogle">) are added below once AdSense approves the site. -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8257776038246961" crossorigin="anonymous"></script>
</head>
<body data-mode="timer" data-phase="idle">
  <div class="bg-layer" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true">
        <circle cx="32" cy="34" r="24" fill="none" stroke="currentColor" stroke-width="5"/>
        <path d="M32 20v14l9 5" stroke="currentColor" stroke-width="5" stroke-linecap="round" fill="none"/>
        <rect x="26" y="6" width="12" height="6" rx="2" fill="currentColor"/>
      </svg>
      <span>ReadySetTimer</span>
    </div>

    <nav class="mode-tabs" role="tablist" aria-label="Mode">
      <button class="tab is-active" data-mode="timer" role="tab" aria-selected="true" data-i18n="tab.timer" data-i18n-attr="title:tab.timer">Timer</button>
      <button class="tab" data-mode="pomodoro" role="tab" aria-selected="false" data-i18n="tab.pomodoro" data-i18n-attr="title:tab.pomodoro">Pomodoro</button>
      <button class="tab" data-mode="stopwatch" role="tab" aria-selected="false" data-i18n="tab.stopwatch" data-i18n-attr="title:tab.stopwatch">Stopwatch</button>
    </nav>

    <div class="top-actions">
      <button class="icon-btn" id="btn-lang" data-i18n-attr="title:settings.lang,aria-label:settings.lang" title="Language" aria-label="Language">
        <svg viewBox="0 0 24 24" width="20" height="20"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><path d="M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button class="icon-btn" id="btn-sound" data-i18n-attr="title:action.sound,aria-label:action.soundAria" title="Sound" aria-label="Toggle sound">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor"/><path class="wave" d="M16 8a5 5 0 0 1 0 8M18.5 5.5a9 9 0 0 1 0 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
      </button>
      <button class="icon-btn" id="btn-settings" data-i18n-attr="title:action.settings,aria-label:action.settingsAria" title="Settings" aria-label="Open settings">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" stroke="currentColor" stroke-width="2" fill="none"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z" stroke="currentColor" stroke-width="2" fill="none"/></svg>
      </button>
      <button class="icon-btn" id="btn-fullscreen" data-i18n-attr="title:action.fullscreen,aria-label:action.fullscreenAria" title="Fullscreen" aria-label="Fullscreen">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
      </button>
    </div>
  </header>

  <!-- Language popover -->
  <div class="lang-menu" id="lang-menu" hidden role="menu" aria-label="Language"></div>

  <!-- Big final countdown overlay -->
  <div class="big-countdown" id="big-countdown" aria-hidden="true">
    <span id="big-num">6</span>
  </div>

  <main class="stage timer-view">
    <div class="badge-row" aria-live="polite">
      <span class="badge" id="phase-badge">Ready</span>
      <span class="badge badge-muted" id="cycle-badge" hidden>0 / 4</span>
    </div>

    <div class="timer-wrap">
      <svg class="ring" viewBox="0 0 400 400" aria-hidden="true">
        <circle class="ring-track" cx="200" cy="200" r="186" />
        <circle class="ring-progress" cx="200" cy="200" r="186" />
      </svg>
      <div class="time-display" id="time-display" aria-live="off">
        <span class="time-main"><span id="t-h">00</span><span class="colon">:</span><span id="t-m">25</span><span class="colon">:</span><span id="t-s">00</span></span>
        <span class="time-sub" id="time-sub"></span>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-ghost" id="btn-reset" data-i18n-attr="title:btn.reset">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M3 12a9 9 0 1 0 3-6.7L3 8" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M3 3v5h5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        <span data-i18n="btn.reset">Reset</span>
      </button>
      <button class="btn btn-primary" id="btn-start" data-i18n-attr="title:btn.start">
        <svg class="ico-play" viewBox="0 0 24 24" width="22" height="22"><path d="M7 4l13 8-13 8V4z" fill="currentColor"/></svg>
        <svg class="ico-pause" viewBox="0 0 24 24" width="22" height="22" style="display:none"><path d="M7 4h4v16H7zM13 4h4v16h-4z" fill="currentColor"/></svg>
        <span id="btn-start-label" data-i18n="btn.start">Start</span>
      </button>
      <button class="btn btn-ghost" id="btn-skip" data-i18n-attr="title:btn.skip">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M5 5l10 7-10 7V5zM17 5h2v14h-2z" fill="currentColor"/></svg>
        <span data-i18n="btn.skip">Skip</span>
      </button>
    </div>

    <div class="presets" id="presets" aria-label="Presets">
      <button class="preset" data-seconds="60">1 min</button>
      <button class="preset" data-seconds="180">3 min</button>
      <button class="preset" data-seconds="300">5 min</button>
      <button class="preset" data-seconds="600">10 min</button>
      <button class="preset" data-seconds="900">15 min</button>
      <button class="preset" data-seconds="1800">30 min</button>
      <button class="preset" data-seconds="2700">45 min</button>
      <button class="preset" data-seconds="3600">60 min</button>
      <button class="preset preset-custom" id="preset-custom" data-i18n="btn.customInput">＋ Custom</button>
    </div>

    <p class="shortcut-hint" id="hint-timer" data-i18n="hint.timer"></p>
  </main>

  <!-- Stopwatch view -->
  <main class="stage stopwatch-view" hidden>
    <div class="sw-display">
      <div class="sw-time">
        <span id="sw-m">00</span><span class="colon">:</span><span id="sw-s">00</span><span class="sw-frac">.<span id="sw-cs">00</span></span>
      </div>
      <div class="sw-sub" id="sw-sub">Ready</div>
    </div>

    <div class="controls">
      <button class="btn btn-ghost" id="sw-reset">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M3 12a9 9 0 1 0 3-6.7L3 8" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M3 3v5h5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        <span data-i18n="btn.reset">Reset</span>
      </button>
      <button class="btn btn-primary" id="sw-start">
        <svg class="ico-play" viewBox="0 0 24 24" width="22" height="22"><path d="M7 4l13 8-13 8V4z" fill="currentColor"/></svg>
        <svg class="ico-pause" viewBox="0 0 24 24" width="22" height="22" style="display:none"><path d="M7 4h4v16H7zM13 4h4v16h-4z" fill="currentColor"/></svg>
        <span id="sw-start-label" data-i18n="btn.start">Start</span>
      </button>
      <button class="btn btn-ghost" id="sw-lap">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 2v4M12 18v4M2 12h4M18 12h4M4.9 4.9l2.8 2.8M16.3 16.3l2.8 2.8M4.9 19.1l2.8-2.8M16.3 7.7l2.8-2.8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span data-i18n="btn.lap">Lap</span>
      </button>
      <button class="btn btn-ghost" id="sw-save">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M5 5v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7l-4-4H7a2 2 0 0 0-2 2z" stroke="currentColor" stroke-width="2" fill="none"/><path d="M8 3v4h8V3M8 13h8v8H8z" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        <span data-i18n="btn.saveRecord">Save run</span>
      </button>
    </div>

    <div class="sw-columns">
      <section class="sw-laps">
        <h3><span data-i18n="sw.titleLaps">Laps</span> <span class="sw-count" id="sw-lap-count">0</span></h3>
        <ol id="sw-lap-list" class="sw-list"></ol>
        <p class="sw-empty" id="sw-lap-empty" data-i18n="sw.emptyLaps"></p>
      </section>
      <section class="sw-history">
        <h3><span data-i18n="sw.titleHistory">Saved runs</span> <span class="sw-count" id="sw-hist-count">0</span>
          <span class="sw-actions">
            <button class="sw-clear-all" id="sw-export-all" data-i18n="sw.exportAll">Export all CSV</button>
            <button class="sw-clear-all danger" id="sw-clear-all" data-i18n="btn.clearAll">Clear all</button>
          </span>
        </h3>
        <ol id="sw-hist-list" class="sw-list"></ol>
        <p class="sw-empty" id="sw-hist-empty" data-i18n="sw.emptyHistory"></p>
      </section>
    </div>

    <p class="shortcut-hint" id="hint-sw" data-i18n="hint.sw"></p>
  </main>

  <!--

  <footer class="site-foot">
    <a href="/about.html">About</a>
    <span>·</span>
    <a href="/privacy.html">Privacy</a>
    <span>·</span>
    <a href="https://github.com/jackthewit/readysettimer" target="_blank" rel="noopener">GitHub</a>
  </footer>

  <!-- Settings modal -->
  <dialog class="modal" id="settings-modal">
    <form method="dialog" class="modal-inner">
      <header class="modal-head">
        <h2 data-i18n="settings.title">Settings</h2>
        <button class="icon-btn" type="button" id="btn-close-settings" data-i18n-attr="aria-label:btn.close">✕</button>
      </header>

      <section class="modal-section">
        <h3 data-i18n="settings.lang">Language</h3>
        <label><span data-i18n="settings.lang">Language</span>
          <select id="opt-lang"></select>
        </label>
      </section>

      <section class="modal-section">
        <h3 data-i18n="settings.timer">Timer</h3>
        <label><span data-i18n="settings.timerDefault">Default duration (min)</span>
          <input type="number" id="opt-timer-minutes" min="1" max="600" step="1" value="25" />
        </label>
      </section>

      <section class="modal-section">
        <h3 data-i18n="settings.pomo">Pomodoro</h3>
        <div class="grid-3">
          <label><span data-i18n="settings.pomoWork">Focus (min)</span><input type="number" id="opt-work" min="1" max="120" value="25" /></label>
          <label><span data-i18n="settings.pomoShort">Short break (min)</span><input type="number" id="opt-short" min="1" max="60" value="5" /></label>
          <label><span data-i18n="settings.pomoLong">Long break (min)</span><input type="number" id="opt-long" min="1" max="60" value="15" /></label>
          <label><span data-i18n="settings.pomoEvery">Long break every</span><input type="number" id="opt-long-every" min="2" max="12" value="4" /></label>
          <label class="check"><input type="checkbox" id="opt-autostart" checked /> <span data-i18n="settings.pomoAuto">Auto-advance</span></label>
        </div>
      </section>

      <section class="modal-section">
        <h3 data-i18n="settings.sound">Sound</h3>
        <label class="check"><input type="checkbox" id="opt-sound" checked /> <span data-i18n="settings.soundUse">Play sound on finish</span></label>
        <div class="grid-3">
          <label><span data-i18n="settings.soundType">Sound</span>
            <select id="opt-sound-type">
              <option value="chime" data-i18n="sound.chime">Chime</option>
              <option value="bell" data-i18n="sound.bell">Bell</option>
              <option value="beep" data-i18n="sound.beep">Beep</option>
              <option value="soft" data-i18n="sound.soft">Soft</option>
              <option value="digital" data-i18n="sound.digital">Digital</option>
            </select>
          </label>
          <label><span data-i18n="settings.soundRepeat">Repeat</span>
            <input type="number" id="opt-sound-repeat" min="1" max="10" value="1" />
          </label>
          <label class="range-label"><span data-i18n="settings.soundVolume">Volume</span> <span id="opt-vol-val">70%</span>
            <input type="range" id="opt-sound-volume" min="0" max="100" value="70" />
          </label>
          <button type="button" class="btn btn-ghost sound-test" id="btn-test-sound" data-i18n="btn.preview">Preview</button>
        </div>
      </section>

      <section class="modal-section">
        <h3 data-i18n="settings.display">Display / Final countdown</h3>
        <label class="check"><input type="checkbox" id="opt-color" checked /> <span data-i18n="settings.color">Color transition</span></label>
        <label class="check"><input type="checkbox" id="opt-hide-ms" checked /> <span data-i18n="settings.big">Show big number in final stretch</span></label>
        <label><span data-i18n="settings.bigSec">Big number threshold (sec)</span>
          <input type="number" id="opt-bigfinal-sec" min="1" max="60" value="6" />
        </label>
      </section>

      <footer class="modal-foot">
        <button class="btn btn-ghost" type="button" id="btn-cancel-settings" data-i18n="btn.cancel">Cancel</button>
        <button class="btn btn-primary" value="save" id="btn-save" data-i18n="btn.save">Save</button>
      </footer>
    </form>
  </dialog>

  <!-- Stopwatch save modal -->
  <dialog class="modal" id="sw-save-modal">
    <form method="dialog" class="modal-inner">
      <header class="modal-head">
        <h2 data-i18n="swsave.title">Save run</h2>
        <button class="icon-btn" type="button" id="btn-close-sw" data-i18n-attr="aria-label:btn.close">✕</button>
      </header>
      <section class="modal-section">
        <div class="sw-save-preview">
          <span class="sw-save-time" id="sw-save-time">00:00.00</span>
          <span class="sw-save-meta" id="sw-save-meta"></span>
        </div>
        <label><span data-i18n="swsave.name">Session title</span>
          <input type="text" id="sw-save-label" maxlength="60" data-i18n-attr="placeholder:swsave.namePh" autocomplete="off" required />
        </label>
        <label><span data-i18n="swsave.note">Session note (optional)</span>
          <textarea id="sw-save-note" maxlength="240" rows="2" data-i18n-attr="placeholder:swsave.notePh"></textarea>
        </label>
      </section>
      <footer class="modal-foot">
        <button class="btn btn-ghost" type="button" id="btn-cancel-sw" data-i18n="btn.cancel">Cancel</button>
        <button class="btn btn-primary" value="save" id="sw-save-confirm" data-i18n="btn.save">Save</button>
      </footer>
    </form>
  </dialog>

  <!-- Custom preset modal -->
  <dialog class="modal" id="custom-modal">
    <form method="dialog" class="modal-inner">
      <header class="modal-head">
        <h2 data-i18n="cp.title">Custom preset</h2>
        <button class="icon-btn" type="button" id="btn-close-custom" data-i18n-attr="aria-label:btn.close">✕</button>
      </header>
      <section class="modal-section">
        <div class="grid-3">
          <label><span data-i18n="cp.hour">Hours</span><input type="number" id="cp-h" min="0" max="9" value="0" /></label>
          <label><span data-i18n="cp.min">Min</span><input type="number" id="cp-m" min="0" max="59" value="20" /></label>
          <label><span data-i18n="cp.sec">Sec</span><input type="number" id="cp-s" min="0" max="59" value="0" /></label>
        </div>
        <label><span data-i18n="cp.name">Name (optional)</span><input type="text" id="cp-name" maxlength="16" data-i18n-attr="placeholder:cp.namePh" /></label>
      </section>
      <footer class="modal-foot">
        <button class="btn btn-ghost" type="button" id="btn-cancel-custom" data-i18n="btn.cancel">Cancel</button>
        <button class="btn btn-primary" value="save" id="cp-save" data-i18n="btn.add">Add</button>
      </footer>
    </form>
  </dialog>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
